layout: default
permalink: /wiki/
title: Wiki
---
<!-- Todo: Look Into "Jekyll Collections" -->

<style>
details {
	border: 1px solid var(--accent-color2);
	padding: 0.5em 0.5em 0;
	margin-bottom: 0.5rem;
}

details[open] {
	padding: 0.5em;
}

summary {
	font-weight: bold;
	margin: -0.5em -0.5em 0;
	padding: 0.5em;
	cursor: pointer;
	user-select: none;
}

details[open] summary {
	border-bottom: 1px solid var(--accent-color2);
	margin-bottom: 0.5em;
}
ul {
	list-style-type: "- ";
}
</style>

<h1>Wiki</h1>
<p style="margin-bottom: 1rem;">Wiki is available for the following versions:</p>

<div>
	{% for tag in site.tags %}
	<details>
		<summary>{{ tag[0] }}</summary>
		<ul>
			{% for post in tag[1] %}
				{% if post.categories contains 'wiki' %}
					<li><a href="{{ post.url }}">{{ post.title }}</a></li>
				{% endif %}
			{% endfor %}
		</ul>
	</details>
	{% endfor %}
</div>
