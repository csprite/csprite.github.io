<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" href="/assets/favicon.png" />
	<title>{{ page.title }}</title>
	<link rel="stylesheet" href="/css/default.css">
	<link rel="stylesheet" href="/css/typography.css">
	<link rel="stylesheet" href="/css/normalize.css">
	<!-- Generated By: ./vendor/bundle/ruby/3.1.0/bin/rougify style monokai.sublime > ./css/syntax.css -->
	<link rel="stylesheet" href="/css/syntax.css">
</head>
<body>
	<header>
		<nav>
		{% if page.url != "/" %}
			<a style="display: inline-block; text-align: justify;" href="/">Home</a>
		{% endif %}
			<a style="display: inline-block; text-align: justify;" href="/wiki/">Wiki</a>
			<a style="display: inline-block; text-align: justify;" href="/contribute.html">Contribute</a>
			<a style="display: inline-block; text-align: justify;" href="https://github.com/csprite/csprite">GitHub</a>
		</nav>
	</header>
	<main id="MainContainer">
		{% if site.categories contains 'wiki' %}
			{% include anchor_headings.html html=content anchorBody="#" %}
		{% else %}
			{{ content }}
		{% endif %}
	</main>
	<footer>
		<nav>
			<a href="https://github.com/csprite/csprite.github.io">Source</a>
			<a href="/licenses.html">Licenses</a>
		</nav>
	</footer>
</body>
</html>
